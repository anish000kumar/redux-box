name: Deploy Examples

# Builds the two example apps in `examples/` and publishes the result to
# GitHub Pages. The deployed site has the layout:
#
#   /redux-box/examples/                     ← landing page (this workflow)
#   /redux-box/examples/crud-rest/           ← CRUD example
#   /redux-box/examples/trello-graphql/      ← Trello-style GraphQL example
#
# This is a separate workflow from `deploy-docs.yml` so the Pages source
# can be flipped between docs and examples without touching the other.
# If you want both on the same Pages site, merge the two workflows and
# combine the artefacts into a single upload step.

on:
  push:
    branches: [master]
    paths:
      - 'examples/**'
      - 'src/**'
      - '.github/workflows/deploy-examples.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Pages can only have a single in-flight deploy per environment. Cancel
# any earlier examples build that is still queued so the latest commit
# always wins.
concurrency:
  group: pages
  cancel-in-progress: true

env:
  # Public path the GitHub Pages site will be served under. Override at
  # workflow_dispatch time if your fork is hosted somewhere else.
  SITE_BASE: /redux-box/examples

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ----- 1. Build the local redux-box library --------------------
      # Each example links the library through `"redux-box": "file:../.."`,
      # so we need a fresh `dist/` before the example installs run.
      - name: Install redux-box deps
        run: npm install --ignore-scripts
      - name: Build redux-box
        run: npm run build

      # ----- 2. Build the CRUD REST example --------------------------
      - name: Install crud-rest deps
        working-directory: examples/crud-rest
        run: npm install --ignore-scripts
      - name: Build crud-rest
        working-directory: examples/crud-rest
        env:
          VITE_BASE_PATH: ${{ env.SITE_BASE }}/crud-rest/
        run: npm run build

      # ----- 3. Build the Trello GraphQL example ---------------------
      - name: Install trello-graphql deps
        working-directory: examples/trello-graphql
        run: npm install --ignore-scripts
      - name: Build trello-graphql
        working-directory: examples/trello-graphql
        env:
          VITE_BASE_PATH: ${{ env.SITE_BASE }}/trello-graphql/
        run: npm run build

      # ----- 4. Stage the combined site ------------------------------
      - name: Stage Pages site
        run: |
          set -euo pipefail
          mkdir -p public/crud-rest public/trello-graphql
          cp -R examples/crud-rest/dist/.       public/crud-rest/
          cp -R examples/trello-graphql/dist/.  public/trello-graphql/
          cp examples/_landing.html             public/index.html
          # GitHub Pages serves the same file for /foo and /foo/, so a
          # `.nojekyll` marker prevents Jekyll from stripping the
          # underscore-prefixed Vite asset paths.
          touch public/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
